<!DOCTYPE html>
<html>
<head>
  <title>Payment Demo</title>
  <style>
    body { font-family: Arial; background:#0b1117; color:white; padding:40px; }
    button, select, input { margin:8px; padding:12px 18px; border:0; border-radius:8px; }
    button { cursor:pointer; color:white; font-weight:bold; }
    .success { background:#16a34a; }
    .error { background:#dc2626; }
    .slow { background:#f59e0b; }
    .cpu { background:#7c3aed; }
    .start { background:#2563eb; }
    .stop { background:#6b7280; }
    .card { background:#111827; padding:20px; border-radius:10px; margin-top:20px; }
    pre { background:#020617; padding:20px; border-radius:8px; overflow:auto; }
  </style>
</head>
<body>
  <h1>Payment Service Demo</h1>
  <p>Generate successful payments, failures, latency, CPU spikes, and continuous traffic.</p>

  <div class="card">
    <h2>Manual Incident Actions</h2>
    <button class="success" onclick="callApi('/payment/pay')">Successful Payment</button>
    <button class="error" onclick="callApi('/payment/pay/error')">Failed Payment</button>
    <button class="slow" onclick="callApi('/payment/pay/slow')">Slow Payment</button>
    <button class="cpu" onclick="callApi('/payment/cpu')">CPU Spike</button>
  </div>

  <div class="card">
    <h2>Traffic Generator</h2>

    <label>Requests/sec:</label>
    <select id="rps">
      <option value="1">1</option>
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="25">25</option>
      <option value="50">50</option>
    </select>

    <label>Traffic Pattern:</label>
    <select id="pattern">
      <option value="normal">Normal: mostly successful</option>
      <option value="incident">Incident: more failures and slow requests</option>
      <option value="errors">Errors only</option>
    </select>

    <br>

    <button class="start" onclick="startTraffic()">Start Traffic</button>
    <button class="stop" onclick="stopTraffic()">Stop Traffic</button>
  </div>

  <div class="card">
    <h2>Status</h2>
    <p id="status">Traffic stopped</p>
    <pre id="output">Response will appear here...</pre>
  </div>

  <script>
    let trafficTimer = null;
    let sent = 0;
    let failed = 0;

    async function callApi(path) {
      const output = document.getElementById('output');

      try {
        const res = await fetch(path);
        const text = await res.text();

        if (!res.ok) failed++;
        output.textContent = 'HTTP ' + res.status + '\n\n' + text;
      } catch (err) {
        failed++;
        output.textContent = 'Error: ' + err;
      }
    }

    function chooseEndpoint(pattern) {
      const rand = Math.random();

      if (pattern === 'errors') {
        return '/payment/pay/error';
      }

      if (pattern === 'incident') {
        if (rand < 0.50) return '/payment/pay';
        if (rand < 0.75) return '/payment/pay/error';
        if (rand < 0.95) return '/payment/pay/slow';
        return '/payment/cpu';
      }

      if (rand < 0.85) return '/payment/pay';
      if (rand < 0.93) return '/payment/pay/slow';
      if (rand < 0.98) return '/payment/pay/error';
      return '/payment/cpu';
    }

    function startTraffic() {
      stopTraffic();

      const rps = parseInt(document.getElementById('rps').value);
      const pattern = document.getElementById('pattern').value;
      const interval = 1000 / rps;

      document.getElementById('status').textContent =
        'Traffic running: ' + rps + ' req/sec, pattern=' + pattern;

      trafficTimer = setInterval(() => {
        const endpoint = chooseEndpoint(pattern);
        sent++;
        callApi(endpoint);
        document.getElementById('status').textContent =
          'Traffic running | Sent: ' + sent + ' | Failed: ' + failed;
      }, interval);
    }

    function stopTraffic() {
      if (trafficTimer) {
        clearInterval(trafficTimer);
        trafficTimer = null;
      }

      document.getElementById('status').textContent =
        'Traffic stopped | Sent: ' + sent + ' | Failed: ' + failed;
    }
  </script>
</body>
</html>
